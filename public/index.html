<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASN Newsletter Tool</title>
  <meta name="description" content="Generate HTML listing blocks for the American Snowbird Network guest newsletter." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f14;
      --surface:    #151820;
      --surface-2:  #1c2030;
      --border:     #252a38;
      --accent:     #6366f1;
      --accent-glow:#6366f140;
      --accent-2:   #22d3ee;
      --text:       #e4e8f0;
      --text-muted: #68748a;
      --text-dim:   #9aa3b4;
      --success:    #22c55e;
      --danger:     #ef4444;
      --radius:     12px;
      --radius-sm:  8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    header h1 { font-size: 17px; font-weight: 600; }

    .header-tag {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── Main ── */
    .main {
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .generator-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-row input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
    }
    .input-row input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: var(--success); }
    .btn-success:hover { background: #16a34a; }

    .split-view {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      font-weight: 600;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-container {
      background: #ffffff;
      color: #000000;
      padding: 24px;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
    }

    .html-container {
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    .html-container textarea {
      flex: 1;
      width: 100%;
      min-height: 300px;
      background: var(--bg);
      color: var(--text);
      border: none;
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      resize: vertical;
      outline: none;
    }

    .error-msg {
      color: var(--danger);
      font-size: 14px;
      margin-top: 8px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f475e; }

  </style>
</head>
<body>

<header>
  <div class="logo">✉️</div>
  <h1>ASN Newsletter Tool</h1>
  <span class="header-tag">American Snowbird Network</span>
</header>

<main class="main">
  <!-- Queue Setup -->
  <div class="generator-box">
    <h2>Start Newsletter Workflow</h2>
    <p style="color: var(--text-muted); font-size: 14px;">Enter a comma-separated list of listing IDs to begin building your blocks.</p>
    <div class="input-row">
      <input type="text" id="batchIds" placeholder="e.g. 34606, 22698, 10502" style="width: 500px;" />
      <button class="btn" id="startBtn" onclick="startWorkflow()">Start Workflow</button>
    </div>
    <div id="errorMsg" class="error-msg"></div>
  </div>

  <div class="split-view" id="workflowView" style="display: none;">
    <!-- Left: Active Editor -->
    <div class="panel">
      <div class="panel-header">
        <span id="editorTitle">Editor</span>
        <div>
          <button class="btn btn-success" style="padding: 6px 12px; font-size: 12px;" onclick="approveAndNext()">Approve &amp; Next</button>
        </div>
      </div>
      <div style="padding: 16px; border-bottom: 1px solid var(--border); background: var(--surface-2);">
        <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block;">Custom Image URL override (Optional)</label>
        <div class="input-row">
           <input type="text" id="imageUrlInput" placeholder="Paste full image URL" style="width: 100%;" onchange="updatePreviewFromInputs()"/>
           <button class="btn" style="padding: 8px 12px; font-size: 12px; flex-shrink: 0;" onclick="updatePreviewFromInputs()">Update Image</button>
        </div>
      </div>

      <div class="preview-container" id="previewContainer"></div>

      <div class="panel-header" style="border-top: 1px solid var(--border);">
        Raw HTML (Editable)
      </div>
      <div class="html-container">
        <textarea id="htmlOutput" oninput="updatePreviewFromHtml()"></textarea>
      </div>
    </div>

    <!-- Right: Queue & Master Export -->
    <div style="display: flex; flex-direction: column; gap: 24px;">
      <div class="panel">
        <div class="panel-header">Workflow Queue</div>
        <div id="queueContainer" style="padding: 16px; display: flex; flex-direction: column; gap: 12px; max-height: 600px; overflow-y: auto;">
          <!-- Queue items generated here -->
        </div>
        <div style="padding: 10px 16px; border-top: 1px solid var(--border); background: var(--surface-2);">
          <label style="font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">Add to Queue</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="addQueueInput" placeholder="ID or comma-separated IDs" onkeydown="if(event.key==='Enter') addToQueue()" style="flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; outline: none;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'" />
            <button class="btn" onclick="addToQueue()" style="padding: 7px 12px; font-size: 13px; flex-shrink: 0;">+ Add</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Master Export</div>
        <div style="padding: 16px; text-align: center;">
          <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 16px;">Copy the final combined HTML for all approved blocks.</p>
          <button class="btn" style="width: 100%; margin-bottom: 12px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text);" onclick="previewMasterHtml()">Preview Full Newsletter</button>
          <button class="btn btn-success" style="width: 100%;" onclick="copyMasterHtml()">Copy All HTML</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Modal for Master Preview -->
<div id="masterPreviewModal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; padding: 40px; overflow-y: auto;">
  <div style="background: white; max-width: 800px; margin: 0 auto; padding: 32px; border-radius: 8px; position: relative;">
    <button onclick="document.getElementById('masterPreviewModal').style.display='none'" style="position: absolute; top: 16px; right: 16px; background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: inherit;">Close</button>
    <div id="masterPreviewContent" style="color: black;"></div>
  </div>
</div>

<script>
  let queue = [];
  let currentIndex = -1;

  async function startWorkflow() {
    const idsText = document.getElementById('batchIds').value;
    const ids = idsText.split(',').map(s => s.trim()).filter(s => s);
    if (ids.length === 0) return;

    queue = ids.map(id => ({ id, data: null, html: '', imageUrl: '', status: 'pending' }));
    document.getElementById('workflowView').style.display = 'grid';
    await loadItem(0);
  }

  async function loadItem(index) {
    if (index < 0 || index >= queue.length) return;

    if (currentIndex !== -1 && currentIndex !== index) {
      queue[currentIndex].html = document.getElementById('htmlOutput').value;
      queue[currentIndex].imageUrl = document.getElementById('imageUrlInput').value.trim();
    }

    currentIndex = index;
    const item = queue[index];

    document.getElementById('editorTitle').innerHTML = `Editing ID: ${item.id} <a href="https://www.americansnowbird.com/listings/view/id/${item.id}" target="_blank" style="font-size: 12px; font-weight: 500; color: var(--accent-2); text-decoration: none; margin-left: 8px; opacity: 0.85;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">View Listing →</a>`;

    if (!item.data) {
      document.getElementById('previewContainer').innerHTML = '<p style="color:#68748a; padding: 12px 0;">Loading listing from americansnowbird.com...</p>';
      try {
        const res = await fetch(`/api/newsletter/${item.id}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        item.data = data;
        if (!item.imageUrl && data.mainImageUrl) {
          item.imageUrl = data.mainImageUrl;
        }
        item.html = buildHtml(data, item.imageUrl);
      } catch (err) {
        document.getElementById('previewContainer').innerHTML = `<span style="color:red">Error loading ${item.id}: ${err.message}</span>`;
        item.html = `<span style="color:red">Error: ${err.message}</span>`;
      }
    }

    document.getElementById('imageUrlInput').value = item.imageUrl || '';
    document.getElementById('htmlOutput').value = item.html;
    document.getElementById('previewContainer').innerHTML = item.html;
    document.getElementById('previewContainer').scrollTop = 0;

    renderQueue();
  }

  function updatePreviewFromInputs() {
    if (currentIndex < 0) return;
    const item = queue[currentIndex];
    item.imageUrl = document.getElementById('imageUrlInput').value.trim();
    if (item.data) {
      item.html = buildHtml(item.data, item.imageUrl);
      document.getElementById('htmlOutput').value = item.html;
      document.getElementById('previewContainer').innerHTML = item.html;
    }
    renderQueue();
  }

  function updatePreviewFromHtml() {
    if (currentIndex < 0) return;
    const item = queue[currentIndex];
    item.html = document.getElementById('htmlOutput').value;
    document.getElementById('previewContainer').innerHTML = item.html;
  }

  function approveAndNext() {
    if (currentIndex < 0) return;
    const item = queue[currentIndex];
    item.html = document.getElementById('htmlOutput').value;
    item.imageUrl = document.getElementById('imageUrlInput').value.trim();
    item.status = 'approved';

    const nextPending = queue.findIndex(q => q.status === 'pending');
    if (nextPending !== -1) {
      loadItem(nextPending);
    } else {
      renderQueue();
      alert('All items approved! You can now copy the master HTML.');
    }
  }

  function renderQueue() {
    const container = document.getElementById('queueContainer');
    container.innerHTML = '';

    queue.forEach((item, idx) => {
      const div = document.createElement('div');
      div.style.display = 'flex';
      div.style.alignItems = 'center';
      div.style.gap = '12px';
      div.style.padding = '8px';
      div.style.background = idx === currentIndex ? 'var(--surface-2)' : 'var(--bg)';
      div.style.border = idx === currentIndex ? '1px solid var(--accent)' : '1px solid var(--border)';
      div.style.borderRadius = '8px';

      const thumbUrl = item.imageUrl || '';
      const thumbHtml = thumbUrl
        ? `<img src="${thumbUrl}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px; flex-shrink: 0;" />`
        : `<div style="width: 50px; height: 50px; background: #333; border-radius: 4px; flex-shrink: 0;"></div>`;

      const statusIcon = item.status === 'approved'
        ? '<span style="color:var(--success); font-weight: bold;">✓ Approved</span>'
        : '<span style="color:var(--text-dim); font-size: 12px;">Pending</span>';

      div.innerHTML = `
        <div style="display:flex; flex-direction: column; gap: 4px; flex-shrink: 0;">
          <button onclick="moveUp(${idx})" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:12px;">▲</button>
          <button onclick="moveDown(${idx})" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:12px;">▼</button>
        </div>
        ${thumbHtml}
        <div style="flex: 1; display: flex; flex-direction: column;">
          <strong style="font-size: 14px;">ID: ${item.id}</strong>
          ${statusIcon}
        </div>
        <div style="display:flex; flex-direction: column; gap: 4px; flex-shrink: 0;">
          <button class="btn" style="padding: 4px 8px; font-size: 11px;" onclick="loadItem(${idx})">Edit</button>
          <button class="btn btn-danger" style="padding: 4px 8px; font-size: 11px;" onclick="deleteItem(${idx})">Delete</button>
        </div>
      `;
      container.appendChild(div);
    });
  }

  async function addToQueue() {
    const input = document.getElementById('addQueueInput');
    const ids = input.value.split(',').map(s => s.trim()).filter(s => s);
    if (ids.length === 0) return;

    const existing = new Set(queue.map(q => q.id));
    const newIds = ids.filter(id => !existing.has(id));
    if (newIds.length === 0) { input.value = ''; return; }

    const firstNewIndex = queue.length;
    newIds.forEach(id => queue.push({ id, data: null, html: '', imageUrl: '', status: 'pending' }));
    input.value = '';
    renderQueue();
    await loadItem(firstNewIndex);
  }

  function moveUp(idx) {
    if (idx === 0) return;
    const temp = queue[idx]; queue[idx] = queue[idx - 1]; queue[idx - 1] = temp;
    if (currentIndex === idx) currentIndex = idx - 1;
    else if (currentIndex === idx - 1) currentIndex = idx;
    renderQueue();
  }

  function moveDown(idx) {
    if (idx === queue.length - 1) return;
    const temp = queue[idx]; queue[idx] = queue[idx + 1]; queue[idx + 1] = temp;
    if (currentIndex === idx) currentIndex = idx + 1;
    else if (currentIndex === idx + 1) currentIndex = idx;
    renderQueue();
  }

  function deleteItem(idx) {
    queue.splice(idx, 1);
    if (currentIndex === idx) {
      currentIndex = -1;
      document.getElementById('previewContainer').innerHTML = '';
      document.getElementById('htmlOutput').value = '';
      document.getElementById('editorTitle').textContent = 'Editor';
    } else if (currentIndex > idx) {
      currentIndex--;
    }
    renderQueue();
  }

  function previewMasterHtml() {
    const combinedHtml = queue.map(q => q.html).join('\n<br><br>\n');
    document.getElementById('masterPreviewContent').innerHTML = combinedHtml;
    document.getElementById('masterPreviewModal').style.display = 'block';
  }

  function copyMasterHtml() {
    const combinedHtml = queue.map(q => q.html).join('\n<br><br>\n');
    navigator.clipboard.writeText(combinedHtml).then(() => {
      alert('All HTML copied to clipboard!');
    }).catch(err => {
      alert('Failed to copy: ' + err);
    });
  }

  // ── Formatter Logic ───────────────────────────────────────────────────────────

  function formatDescription(text) {
    if (!text) return '';
    let cleanText = text.trim();
    cleanText = cleanText.replace(/\s{2,}/g, ' ');

    const letters = cleanText.replace(/[^a-zA-Z]/g, '');
    const upperLetters = cleanText.replace(/[^A-Z]/g, '');
    if (letters.length > 0 && (upperLetters.length / letters.length) > 0.4) {
      cleanText = cleanText.toLowerCase();
      cleanText = cleanText.replace(/(^\s*[a-z]|[\.!\?]\s+[a-z])/g, match => match.toUpperCase());
    }

    if (cleanText.length > 700) {
      let truncated = cleanText.substring(0, 700);
      const lastSpace = truncated.lastIndexOf(' ');
      if (lastSpace > 0) truncated = truncated.substring(0, lastSpace);
      truncated = truncated.replace(/[.,;!?]+$/, '');
      cleanText = truncated + '...';
    }
    return cleanText.replace(/\r\n/g, '<br>').replace(/\n/g, '<br>');
  }

  function getMonthsAvailable(data) {
    const listing = data.listing;
    const rates = data.rates || [];
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    let yearMap = {};

    if (rates.length > 0) {
      rates.forEach(r => {
        if (!r.year || !r.month) return;
        const mName = months[parseInt(r.month, 10) - 1];
        if (!yearMap[r.year]) yearMap[r.year] = new Set();
        yearMap[r.year].add(mName);
      });
    } else {
      const currentMonthIdx = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      months.forEach((m, idx) => {
        if (listing[m] && listing[m] !== null && listing[m] !== '') {
          const yr = (idx >= currentMonthIdx) ? currentYear : currentYear + 1;
          if (!yearMap[yr]) yearMap[yr] = new Set();
          yearMap[yr].add(m);
        }
      });
    }

    let html = '';
    if (Object.keys(yearMap).length > 0) {
      html += '<div style="text-align: center; font-family: Georgia, serif; font-size: 14px; margin-top: 15px;">';
      html += '<u style="font-weight: normal;">Calendar Shows Available</u><br>';
      Object.keys(yearMap).sort().forEach(year => {
        html += `${year}: ${Array.from(yearMap[year]).join(', ')}<br>`;
      });
      html += '</div>';
    }
    return html;
  }

  function getDiscounts(listing) {
    let html = '';
    const discounts = [];
    for (let i = 2; i <= 6; i++) {
      if (listing['mmdiscount' + i] && parseInt(listing['mmdiscount' + i]) > 0) {
        discounts.push(`${i} Months: $${listing['mmdiscount' + i]}/Month`);
      }
    }
    if (discounts.length > 0) {
      html += '<div style="text-align: center; font-family: Georgia, serif; font-size: 14px; margin-top: 15px;">';
      html += '<strong style="text-decoration: underline;">MULTI-MONTH Discounts!</strong><br>';
      discounts.forEach(d => { html += `${d}<br>`; });
      html += '</div>';
    }
    return html;
  }

  function getRates(data) {
    const listing = data.listing;
    const rates = data.rates || [];
    let html = '<div style="text-align: center; font-family: Georgia, serif; font-size: 16px; margin-top: 15px;">';

    let displayPrice = listing.price;
    let priceNum = parseFloat(displayPrice);

    if (!displayPrice || displayPrice === '0' || displayPrice === 0 || (priceNum && priceNum > 4000)) {
      displayPrice = null;
      let validRates = rates.map(r => parseFloat(r.monthly)).filter(m => m && !isNaN(m) && m > 0);

      if (validRates.length > 0) {
        let minRate = Math.min(...validRates);
        let maxRate = Math.max(...validRates);
        displayPrice = minRate === maxRate ? minRate : `${minRate} - $${maxRate}`;
      }
    }

    if (!displayPrice) {
      html += '<strong><em><span style="background-color: #a2d2db; padding: 2px 5px;">No Rates Displayed</span></em></strong><br>';
      html += '<em style="font-size: 14px;">Please contact the Owner/Manager for Rate Information</em>';
    } else {
      let priceStr = displayPrice.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      html += `<strong><span style="background-color: #a2d2db; padding: 2px 5px;">$${priceStr}/mo</span></strong><br>`;
      html += '<em style="font-size: 14px;">(Rental Rates only - does not include taxes &amp; fees)</em>';
    }
    html += '</div>';
    return html;
  }

  function buildHtml(data, customImageUrl) {
    const listing = data.listing;
    const city = listing.city || '';
    const state = listing.state || '';
    const propType = listing.propertytype || 'Home';
    const beds = listing.beds || 0;
    const baths = Math.floor(listing.baths) === listing.baths ? listing.baths : listing.baths.toFixed(1);
    const sleeps = listing.tenants || 0;
    const desc = formatDescription(listing.amenities_desc);

    const ratesHtml = getRates(data);
    const calendarHtml = getMonthsAvailable(data);
    const discountsHtml = getDiscounts(listing);

    const imageUrl = customImageUrl || '';

    return `
<div style="font-family: Georgia, 'Times New Roman', Times, serif; color: #000000; max-width: 600px; margin: 0 auto;">
  <div style="text-align: center; font-size: 16px; margin-bottom: 10px;">
    <strong><u>${city}, ${state}</u></strong><br>
    Property Type: ${propType}<br>
    ${beds}BR ${baths}BA Sleeps: ${sleeps}
  </div>

  <div style="margin-bottom: 10px;">
    <img src="${imageUrl}" alt="${city} Rental" style="width: 100%; height: auto; display: block; border: 0;" />
  </div>

  <div style="text-align: center; font-size: 14px; margin-bottom: 15px;">
    Listing ID: ${listing.id}
  </div>

  <div style="font-size: 14px; line-height: 1.5; text-align: center; padding: 0 10px;">
    ${desc}
  </div>

  ${ratesHtml}
  ${calendarHtml}
  ${discountsHtml}
</div>
    `.trim();
  }
</script>

</body>
</html>
