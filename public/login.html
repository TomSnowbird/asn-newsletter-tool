<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ASN Newsletter Tool</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f14;
      --surface:    #151820;
      --surface-2:  #1c2030;
      --border:     #252a38;
      --accent:     #6366f1;
      --accent-glow:#6366f140;
      --accent-2:   #22d3ee;
      --text:       #e4e8f0;
      --text-muted: #68748a;
      --text-dim:   #9aa3b4;
      --danger:     #ef4444;
      --radius:     14px;
      --radius-sm:  8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Ambient glow behind card ── */
    body::before {
      content: '';
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at center, #6366f118 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      position: relative;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
    }

    .brand-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: var(--border);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 44px 11px 14px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s;
    }
    .toggle-pw:hover { color: var(--text-dim); }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover   { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:active  { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-submit .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #ef444412;
      border: 1px solid #ef444430;
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      display: none;
      animation: shake 0.3s ease;
    }
    .error-box.visible { display: block; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="logo">✉️</div>
    <div class="brand-text">
      <h1>ASN Newsletter Tool</h1>
      <p>American Snowbird Network · Internal</p>
    </div>
  </div>

  <div class="divider"></div>

  <form class="form-group" id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          autofocus
          required
        />
        <button type="button" class="toggle-pw" id="togglePw" onclick="togglePassword()" title="Show/hide password">
          👁
        </button>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <button type="submit" class="btn-submit" id="submitBtn">
      <span class="btn-label">Sign In</span>
      <div class="spinner"></div>
    </button>
  </form>

  <div class="footer">This tool is for internal ASN team use only.</div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');

    btn.disabled = true;
    btn.classList.add('loading');
    errorBox.classList.remove('visible');

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });

      const data = await res.json();

      if (res.ok && data.success) {
        // Redirect to the app — cookie is now set
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
        window.location.href = redirect;
      } else {
        throw new Error(data.error || 'Incorrect password.');
      }
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add('visible');
      btn.disabled = false;
      btn.classList.remove('loading');
      document.getElementById('password').select();
    }
  }
</script>

</body>
</html>
